<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>
<style>
* {
  margin: 0; padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}
body {
  background: #f8f9fa;
  padding: 20px;
}
.profile-card {
  max-width: 460px;
  margin: 0 auto;
  background: #fff;
  padding: 32px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.avatar {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #edf2f7;
  margin-bottom: 20px;
}
input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #e2e8f0;
  border-radius: 14px;
  background: #fafbfc;
  margin: 10px 0;
  outline: none;
  font-size: 15px;
}
.btn-save {
  padding: 12px 30px;
  background: #6366f1;
  color: #fff;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-size: 15px;
  margin-top: 10px;
}
.album-title {
  margin: 30px 0 15px;
  color: #2d3748;
  font-weight: 600;
}
.album-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}
.album-grid img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 12px;
}
.nav-link {
  display: inline-block;
  margin: 20px 8px 0;
  color: #6366f1;
  text-decoration: none;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="profile-card">
  <img id="myAva" class="avatar">
  <input type="text" id="nick" placeholder="修改昵称">
  <input type="text" id="avaUrl" placeholder="粘贴头像图片链接">
  <button class="btn-save" onclick="saveInfo()">保存修改</button>

  <h4 class="album-title">个人相册</h4>
  <input type="file" id="albumUp" accept="image/*" onchange="addAlbum()">
  <div class="album-grid" id="albumBox"></div>

  <div>
    <a href="index.html" class="nav-link">首页</a>
    <a href="message.html" class="nav-link">私信</a>
  </div>
</div>

<script>
const currUser = localStorage.getItem("currUser");
if (!currUser) location.href = "login.html";
let user = JSON.parse(localStorage.getItem("user_" + currUser));

myAva.src = user.avatar;
nick.value = user.nick;

function saveInfo() {
  let n = nick.value.trim();
  let a = avaUrl.value.trim();
  if (n) user.nick = n;
  if (a) user.avatar = a;
  localStorage.setItem("user_" + currUser, JSON.stringify(user));
  alert("资料保存成功");
  location.href = "index.html";
}

function renderAlbum() {
  let html = "";
  user.album.forEach(src => {
    html += `<img src="${src}">`;
  });
  albumBox.innerHTML = html;
}

function addAlbum() {
  let f = albumUp.files[0];
  if (!f) return;
  let r = new FileReader();
  r.onload = e => {
    user.album.push(e.target.result);
    localStorage.setItem("user_" + currUser, JSON.stringify(user));
    renderAlbum();
  };
  r.readAsDataURL(f);
}
renderAlbum();
</script>
</body>
</html>
