<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园广场</title>
<style>
* {
  margin: 0; padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}
body {
  background: #f8f9fa;
  padding: 16px;
  max-width: 880px;
  margin: 0 auto;
}
nav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding-bottom: 16px;
  margin-bottom: 20px;
  border-bottom: 1px solid #e2e8f0;
}
nav a {
  text-decoration: none;
  color: #4a5568;
  padding: 8px 14px;
  border-radius: 12px;
  font-size: 14px;
  transition: 0.2s;
}
nav a:hover {
  background: #edf2f7;
  color: #6366f1;
}
nav a.active {
  background: #6366f1;
  color: #fff;
}
.admin-nav {
  background: #ef4444 !important;
  color: #fff !important;
}
.post-card {
  background: #fff;
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.post-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
}
.nickname {
  font-weight: 600;
  color: #2d3748;
}
.time-text {
  font-size: 12px;
  color: #a0aec0;
  margin-left: auto;
}
.post-title {
  font-size: 17px;
  font-weight: 600;
  color: #2d3748;
  margin: 8px 0;
}
.post-content {
  color: #4a5568;
  line-height: 1.7;
  margin-bottom: 12px;
}
.post-media {
  max-width: 100%;
  border-radius: 14px;
  margin: 10px 0;
}
.post-act {
  display: flex;
  gap: 24px;
  color: #718096;
  font-size: 14px;
  align-items: center;
}
.post-act span {
  cursor: pointer;
}
.liked {
  color: #ef4444;
}
.collected {
  color: #f59e0b;
}
.del-text {
  color: #ef4444;
  margin-left: auto;
  cursor: pointer;
  font-size: 13px;
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="active">首页</a>
  <a href="post.html">发布帖子</a>
  <a href="profile.html">个人主页</a>
  <a href="message.html">私信聊天</a>
  <a id="adminBtn" href="admin.html" class="admin-nav" style="display:none">管理后台</a>
  <a href="javascript:logout()">退出登录</a>
</nav>
<div id="postList"></div>

<script>
const currUser = localStorage.getItem("currUser");
const ADMIN = "13888888888";
if (!currUser) location.href = "login.html";

if (currUser === ADMIN) adminBtn.style.display = "inline-block";

if (!localStorage.getItem("posts")) localStorage.setItem("posts", "[]");
if (!localStorage.getItem("banList")) localStorage.setItem("banList", "[]");
if (!localStorage.getItem("comments")) localStorage.setItem("comments", "[]");

function getUser(phone) {
  let d = localStorage.getItem("user_" + phone);
  return d ? JSON.parse(d) : {nick:"校园用户",avatar:"https://picsum.photos/100/100"};
}

function formatTime(ms) {
  let d = new Date(ms);
  return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function render() {
  let posts = JSON.parse(localStorage.getItem("posts"));
  let html = "";
  posts.forEach(p => {
    let u = getUser(p.uid);
    let isLike = p.like.includes(currUser);
    let isCol = p.collect.includes(currUser);
    html += `
    <div class="post-card">
      <div class="post-head">
        <img class="avatar" src="${u.avatar}">
        <span class="nickname">${u.nick}</span>
        <span class="time-text">${formatTime(p.time)}</span>
        ${currUser===ADMIN ? `<span class="del-text" onclick="delPost(${p.id})">删除</span>` : ""}
      </div>
      <div class="post-title">${p.title}</div>
      <div class="post-content">${p.content}</div>
      ${p.img ? `<img class="post-media" src="${p.img}">` : ""}
      ${p.media ? `<video class="post-media" controls src="${p.media}"></video>` : ""}
      <div class="post-act">
        <span onclick="likePost(${p.id})" class="${isLike?'liked':''}">❤️ ${p.like.length}</span>
        <span onclick="collectPost(${p.id})" class="${isCol?'collected':''}">⭐ ${p.collect.length}</span>
        <span>👁️ ${p.view}</span>
        <a href="comment.html?id=${p.id}" style="color:#6366f1;text-decoration:none">💬 评论</a>
      </div>
    </div>
    `;
  });
  postList.innerHTML = html;
}

function delPost(id) {
  if (!confirm("确定删除该帖子？")) return;
  let arr = JSON.parse(localStorage.getItem("posts"));
  arr = arr.filter(x => x.id !== id);
  localStorage.setItem("posts", JSON.stringify(arr));
  render();
}

function likePost(id) {
  let arr = JSON.parse(localStorage.getItem("posts"));
  let p = arr.find(x => x.id === id);
  let i = p.like.indexOf(currUser);
  i > -1 ? p.like.splice(i,1) : p.like.push(currUser);
  localStorage.setItem("posts", JSON.stringify(arr));
  render();
}

function collectPost(id) {
  let arr = JSON.parse(localStorage.getItem("posts"));
  let p = arr.find(x => x.id === id);
  let i = p.collect.indexOf(currUser);
  i > -1 ? p.collect.splice(i,1) : p.collect.push(currUser);
  localStorage.setItem("posts", JSON.stringify(arr));
  render();
}

function logout() {
  localStorage.removeItem("currUser");
  location.href = "login.html";
}
render();
</script>
</body>
</html>
